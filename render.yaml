services:
  - type: web
    name: melodymorph-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
